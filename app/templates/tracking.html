<!DOCTYPE html>
<html>
<head>
    <title>Fleet Hub Live Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        body{
            font-family:Arial;
            margin:0;
            background:#f6f8fb;
        }

        header{
            background:white;
            border-bottom:1px solid #ddd;
            padding:16px 24px;
        }

        .title{
            font-size:22px;
            font-weight:bold;
        }

        .nav a{
            margin-right:20px;
            text-decoration:none;
            color:#333;
            font-weight:bold;
        }

        #map{
            height:600px;
        }

        .container{
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.05);
            margin-bottom:24px;
        }

        .order-row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:10px 0;
            border-bottom:1px solid #eee;
        }

        .order-row:last-child{
            border-bottom:none;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<header>
    <div class="title">Fleet Hub</div>

    <div class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/tracking">Live Map</a>
    </div>
</header>

<div id="map"></div>

<div class="container">
    <div class="card">
        <h2>Orders waiting dispatch</h2>
        <div id="orders"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([46.2044, 6.1432], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

let driverMarkers = [];
let orderMarkers = [];

async function loadDrivers(){
    const r = await fetch("/drivers");
    const data = await r.json();

    driverMarkers.forEach(m => map.removeLayer(m));
    driverMarkers = [];

    if(!data.drivers) return;

    data.drivers.forEach(driver => {
        if(!driver.latitude || !driver.longitude) return;

        const marker = L.marker([driver.latitude, driver.longitude])
            .addTo(map)
            .bindPopup("Driver: " + (driver.name || driver.id || "unknown"));

        driverMarkers.push(marker);
    });
}

async function loadOrders(){
    const r = await fetch("/platform/orders");
    const data = await r.json();

    orderMarkers.forEach(m => map.removeLayer(m));
    orderMarkers = [];

    const container = document.getElementById("orders");
    container.innerHTML = "";

    if(!data.orders) return;

    data.orders.forEach(order => {
        const row = document.createElement("div");
        row.className = "order-row";

        row.innerHTML = `
            <div>
                <strong>${order.source_order_id}</strong>
                <div>Status: ${order.status || "unknown"}</div>
            </div>
            <div>
                <button onclick="suggestDriver('${order.source_order_id}')">
                    Suggest driver
                </button>
            </div>
        `;

        container.appendChild(row);

        if(order.data){
            const lat = order.data.latitude || order.data.pickupLatitude || order.data.restaurantLatitude;
            const lng = order.data.longitude || order.data.pickupLongitude || order.data.restaurantLongitude;

            if(lat && lng){
                const marker = L.circleMarker([lat, lng], {
                    radius: 8,
                    color: "red"
                })
                .addTo(map)
                .bindPopup("Order " + order.source_order_id);

                orderMarkers.push(marker);
            }
        }
    });
}

async function suggestDriver(orderId){

const r = await fetch("/dispatch/suggest/" + orderId)
const data = await r.json()

if(!data.bestDriver){
alert("No driver available")
return
}

const driver = data.bestDriver

const confirmAssign = confirm(
"Suggested driver:\n"+
driver.name+
"\nDistance: "+driver.distanceKm+" km\n\nAssign?"
)

if(!confirmAssign) return

await fetch(
"/dispatch/assign/"+orderId+"/"+driver.id,
{
method:"POST"
}
)

alert("Driver assigned")

}

async function refreshAll(){
    await loadDrivers();
    await loadOrders();
}

refreshAll();
setInterval(refreshAll, 10000);
</script>

</body>
</html>
