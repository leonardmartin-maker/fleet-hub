<!DOCTYPE html>
<html>
<head>
    <title>Fleet Hub Live Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        body{
            font-family:Arial;
            margin:0;
            background:#f6f8fb;
        }

        header{
            background:white;
            border-bottom:1px solid #ddd;
            padding:16px 24px;
        }

        .title{
            font-size:22px;
            font-weight:bold;
        }

        .nav a{
            margin-right:20px;
            text-decoration:none;
            color:#333;
            font-weight:bold;
        }

        #map{
            height:70vh;
        }

        .container{
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.05);
            margin-bottom:24px;
        }

        .order-row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:12px 0;
            border-bottom:1px solid #eee;
            gap:16px;
        }

        .order-row:last-child{
            border-bottom:none;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#1d4ed8;
        }

        .legend{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
        }

        .legend-badge{
            color:white;
            padding:6px 10px;
            border-radius:999px;
            font-weight:bold;
            font-size:13px;
        }
    </style>
</head>

<body>

<header>
    <div class="title">Fleet Hub</div>

    <div class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/tracking">Live Map</a>
    </div>
</header>

<div id="map"></div>

<div class="container">
    <div class="card">
        <h2>Filters</h2>
        <div style="display:flex; gap:12px; align-items:end; flex-wrap:wrap;">
            <div>
                <label style="display:block; font-weight:bold; margin-bottom:6px;">Tenant</label>
                <select id="tenantFilter" style="
                    padding:10px 12px;
                    border:1px solid #d1d5db;
                    border-radius:6px;
                    min-width:220px;
                ">
                    <option value="">All tenants</option>
                </select>
            </div>

            <div>
                <label style="display:block; font-weight:bold; margin-bottom:6px;">Status</label>
                <select id="statusFilter" style="
                    padding:10px 12px;
                    border:1px solid #d1d5db;
                    border-radius:6px;
                    min-width:220px;
                ">
                    <option value="">All status</option>
                    <option value="received">received</option>
                    <option value="created">created</option>
                    <option value="driver_assigned">driver_assigned</option>
                    <option value="to_restaurant">to_restaurant</option>
                    <option value="at_restaurant">at_restaurant</option>
                    <option value="collected">collected</option>
                    <option value="to_customer">to_customer</option>
                    <option value="delivered">delivered</option>
                    <option value="cancelled">cancelled</option>
                </select>
            </div>

            <div>
                <button type="button" onclick="resetFilters()">Reset filters</button>
            </div>
        </div>
    </div>

    <div class="card">
    <h2>Live summary</h2>
    <div id="liveSummary" style="display:flex; gap:12px; flex-wrap:wrap;">
        <div class="legend-badge" style="background:#111827;">Drivers: 0</div>
        <div class="legend-badge" style="background:#2563eb;">Orders: 0</div>
        <div class="legend-badge" style="background:orange;">received: 0</div>
        <div class="legend-badge" style="background:purple;">in progress: 0</div>
        <div class="legend-badge" style="background:green;">delivered: 0</div>
    </div>
</div>

    <div class="card">
        <h2>Legend</h2>
        <div class="legend">
            <span class="legend-badge" style="background:orange;">received</span>
            <span class="legend-badge" style="background:blue;">created</span>
            <span class="legend-badge" style="background:purple;">in progress</span>
            <span class="legend-badge" style="background:green;">delivered</span>
            <span class="legend-badge" style="background:red;">cancelled</span>
            <span class="legend-badge" style="background:gray;">unknown</span>
        </div>
    </div>

    <div class="card">
        <h2>Orders waiting dispatch</h2>
        <div id="orders"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([46.2044, 6.1432], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

const driverIcon = L.divIcon({
    className: '',
    html: `<div style="font-size:20px;">🚗</div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
});

const restaurantIcon = L.divIcon({
    className: '',
    html: `<div style="font-size:20px;">🏪</div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
});

const customerIcon = L.divIcon({
    className: '',
    html: `<div style="font-size:20px;">🏠</div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
});

let driverMarkers = [];
let orderMarkers = [];
let allPoints = [];
let restaurantsCache = [];
let ordersCache = [];
let dispatchLine = null;
let driversCache = [];
let filteredOrdersCache = [];

function getStatusColor(status){
    switch(status){
        case "received":
            return "orange";
        case "created":
            return "blue";
        case "driver_assigned":
        case "to_restaurant":
        case "at_restaurant":
        case "collected":
        case "to_customer":
            return "purple";
        case "delivered":
            return "green";
        case "cancelled":
            return "red";
        default:
            return "gray";
    }
}

async function loadDrivers(){
    const r = await fetch("/drivers");
    const data = await r.json();

    driverMarkers.forEach(m => map.removeLayer(m));
    driverMarkers = [];

    if(!data.drivers){
    driversCache = [];
    return;
}
    driversCache = data.drivers || [];

    data.drivers.forEach(driver => {
        if(!driver.latitude || !driver.longitude) return;

        const marker = L.marker(
            [driver.latitude, driver.longitude],
            { icon: driverIcon }
        )
        .addTo(map)
        .bindPopup(`
            <div style="min-width:180px; line-height:1.5;">
                <div style="font-weight:bold; font-size:14px; margin-bottom:4px;">
                    Driver
                </div>
                <div>Name: ${driver.name || "unknown"}</div>
                <div>ID: ${driver.id || "-"}</div>
            </div>
        `);

        driverMarkers.push(marker);
        allPoints.push([driver.latitude, driver.longitude]);
    });
}

async function loadOrders(){
    const r = await fetch("/platform/orders");
    const data = await r.json();

    orderMarkers.forEach(m => map.removeLayer(m));
    orderMarkers = [];

    const container = document.getElementById("orders");
    container.innerHTML = "";

    if(!data.orders){
        filteredOrdersCache = [];
        updateLiveSummary();
        return;
    }

    ordersCache = data.orders;

    const selectedTenant = getSelectedTenant();
    const selectedStatus = getSelectedStatus();

    const filteredOrders = data.orders.filter(order => {
        if (selectedTenant && (order.tenant_id || "") !== selectedTenant) return false;
        if (selectedStatus && (order.status || "") !== selectedStatus) return false;
        return true;
    });

    filteredOrdersCache = filteredOrders;
    updateLiveSummary();

    if(filteredOrders.length === 0){
        container.innerHTML = `
            <div style="
                color:#666;
                background:#f9fafb;
                border:1px dashed #d1d5db;
                padding:16px;
                border-radius:8px;
            ">
                No orders match the selected filters.
            </div>
        `;
        return;
    }

    filteredOrders.forEach(order => {
        const row = document.createElement("div");
        row.className = "order-row";

        row.innerHTML = `
            <div>
                <strong style="font-size:15px;">${order.source_order_id}</strong>
                <div style="color:#666; margin-top:4px;">Tenant: ${order.tenant_id || "-"}</div>
                <div style="margin-top:6px;">
                    <span style="
                        padding:4px 8px;
                        border-radius:999px;
                        font-weight:bold;
                        color:white;
                        background:${getStatusColor(order.status)};
                        font-size:12px;
                    ">
                        ${order.status || "unknown"}
                    </span>
                </div>
            </div>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                ${order.shipday_tracking_url ? `
                    <a
                        href="${order.shipday_tracking_url}"
                        target="_blank"
                        rel="noopener noreferrer"
                        style="
                            background:#10b981;
                            color:white;
                            padding:8px 10px;
                            border-radius:6px;
                            text-decoration:none;
                            font-weight:bold;
                            font-size:13px;
                        "
                    >
                        Track
                    </a>
                ` : `
                    <span style="
                        color:#666;
                        font-size:13px;
                        background:#f3f4f6;
                        padding:8px 10px;
                        border-radius:6px;
                    ">
                        No track
                    </span>
                `}
                <button onclick="suggestDriver('${order.source_order_id}')">
                    Suggest driver
                </button>
            </div>
        `;

        container.appendChild(row);

        if(order.data){
            const restaurantLat =
                order.data.pickupLatitude ||
                order.data.restaurantLatitude ||
                order.data.latitude;

            const restaurantLng =
                order.data.pickupLongitude ||
                order.data.restaurantLongitude ||
                order.data.longitude;

            const customerLat = order.data.customerLatitude;
            const customerLng = order.data.customerLongitude;

            if(restaurantLat && restaurantLng){
                const restaurantMarker = L.marker(
                    [restaurantLat, restaurantLng],
                    { icon: restaurantIcon }
                )
                .addTo(map)
                .bindPopup(`
                    <div style="min-width:200px; line-height:1.5;">
                        <div style="font-weight:bold; font-size:14px; margin-bottom:4px;">
                            Restaurant
                        </div>
                        <div>Order: ${order.source_order_id}</div>
                        <div>Tenant: ${order.tenant_id || "-"}</div>
                        <div>
                            Status:
                            <span style="
                                padding:2px 6px;
                                border-radius:999px;
                                color:white;
                                background:${getStatusColor(order.status)};
                                font-size:12px;
                                font-weight:bold;
                            ">
                                ${order.status || "unknown"}
                            </span>
                        </div>
                    </div>
                `);

                orderMarkers.push(restaurantMarker);
                allPoints.push([restaurantLat, restaurantLng]);
            }

            if(customerLat && customerLng){
                const customerMarker = L.marker(
                    [customerLat, customerLng],
                    { icon: customerIcon }
                )
                .addTo(map)
                .bindPopup(`
                    <div style="min-width:200px; line-height:1.5;">
                        <div style="font-weight:bold; font-size:14px; margin-bottom:4px;">
                            Customer
                        </div>
                        <div>Order: ${order.source_order_id}</div>
                        <div>Tenant: ${order.tenant_id || "-"}</div>
                        <div>
                            ${
                                order.shipday_tracking_url
                                ? `<a href="${order.shipday_tracking_url}" target="_blank" rel="noopener noreferrer">Open tracking</a>`
                                : `No tracking`
                            }
                        </div>
                    </div>
                `);

                orderMarkers.push(customerMarker);
                allPoints.push([customerLat, customerLng]);
            }
        }
    });
}

function drawDispatchLine(driverLat, driverLng, orderLat, orderLng){
    if(dispatchLine){
        map.removeLayer(dispatchLine);
    }

    dispatchLine = L.polyline(
        [
            [driverLat, driverLng],
            [orderLat, orderLng]
        ],
        {
            color: "#2563eb",
            weight: 4,
            opacity: 0.9,
            dashArray: "8, 8"
        }
    ).addTo(map);
}

async function suggestDriver(orderId){
    const r = await fetch("/dispatch/suggest/" + orderId);
    const data = await r.json();

    if(!data.bestDriver){
        alert("No driver available");
        return;
    }

    const driver = data.bestDriver;
    const order = ordersCache.find(o => o.source_order_id === orderId);

    if(order && order.data){
        const lat =
    order.data.pickupLatitude ||
    order.data.restaurantLatitude ||
    order.data.latitude;

const lng =
    order.data.pickupLongitude ||
    order.data.restaurantLongitude ||
    order.data.longitude;

        if(lat && lng && driver.latitude && driver.longitude){
            drawDispatchLine(
                driver.latitude,
                driver.longitude,
                lat,
                lng
            );
        }
    }

    const confirmAssign = confirm(
        "Suggested driver:\n" +
        (driver.name || "unknown") +
        "\nDistance: " + driver.distanceKm + " km\n\nAssign?"
    );

    if(!confirmAssign) return;

    await fetch(
        "/dispatch/assign/" + orderId + "/" + driver.id,
        {
            method:"POST"
        }
    );

    alert("Driver assigned");
}

function fitMapToPoints(){
    if(!allPoints.length) return;

    const bounds = L.latLngBounds(allPoints);
    map.fitBounds(bounds, { padding: [40, 40] });
}

async function refreshAll(){
    allPoints = [];
    await loadDrivers();
    await loadOrders();
    fitMapToPoints();
}

async function loadTenantFilter(){
    try {
        const r = await fetch("/platform/restaurants");
        const data = await r.json();

        restaurantsCache = data.restaurants || [];

        const select = document.getElementById("tenantFilter");
        const current = select.value;

        select.innerHTML = `<option value="">All tenants</option>`;

        restaurantsCache.forEach(restaurant => {
            const option = document.createElement("option");
            option.value = restaurant.tenantId || "";
            option.textContent = restaurant.tenantId || restaurant.restaurantName || "unknown";
            select.appendChild(option);
        });

        select.value = current;
    } catch (err) {
        console.error("Failed to load tenant filter", err);
    }
}

function getSelectedTenant(){
    const select = document.getElementById("tenantFilter");
    return select ? select.value : "";
}

function getSelectedStatus(){
    const select = document.getElementById("statusFilter");
    return select ? select.value : "";
}

function resetFilters(){
    document.getElementById("tenantFilter").value = "";
    document.getElementById("statusFilter").value = "";
    refreshAll();
}

function updateLiveSummary(){
    const container = document.getElementById("liveSummary");
    if(!container) return;

    const driversCount = driversCache.length;
    const ordersCount = filteredOrdersCache.length;

    let received = 0;
    let inProgress = 0;
    let delivered = 0;

    filteredOrdersCache.forEach(order => {
        const status = order.status || "";

        if(status === "received" || status === "created"){
            received += 1;
            return;
        }

        if(
            status === "driver_assigned" ||
            status === "to_restaurant" ||
            status === "at_restaurant" ||
            status === "collected" ||
            status === "to_customer"
        ){
            inProgress += 1;
            return;
        }

        if(status === "delivered"){
            delivered += 1;
        }
    });

    container.innerHTML = `
        <div class="legend-badge" style="background:#111827;">Drivers: ${driversCount}</div>
        <div class="legend-badge" style="background:#2563eb;">Orders: ${ordersCount}</div>
        <div class="legend-badge" style="background:orange;">received: ${received}</div>
        <div class="legend-badge" style="background:purple;">in progress: ${inProgress}</div>
        <div class="legend-badge" style="background:green;">delivered: ${delivered}</div>
    `;
}

document.getElementById("tenantFilter").addEventListener("change", () => {
    refreshAll();
});

document.getElementById("statusFilter").addEventListener("change", () => {
    refreshAll();
});

async function init(){
    await loadTenantFilter();
    await refreshAll();
    setInterval(refreshAll, 10000);
    updateLiveSummary();
}

init();
</script>

</body>
</html>
