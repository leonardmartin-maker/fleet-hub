<!DOCTYPE html>
<html>
<head>

<title>Fleet Hub Live Map</title>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

body{
font-family:Arial;
margin:0;
background:#f6f8fb;
}

header{
background:white;
border-bottom:1px solid #ddd;
padding:16px 24px;
}

.title{
font-size:22px;
font-weight:bold;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:#333;
font-weight:bold;
}

#map{
height:600px;
}

.container{
padding:20px;
}

</style>

</head>

<body>

<header>

<div class="title">Fleet Hub</div>

<div class="nav">
<a href="/dashboard">Dashboard</a>
<a href="/tracking">Live Map</a>
</div>

</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([46.2044, 6.1432], 13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

async function loadDrivers(){

const r = await fetch("/drivers")
const data = await r.json()

if(!data.drivers) return

data.drivers.forEach(driver => {

if(!driver.latitude) return

L.marker([driver.latitude,driver.longitude])
.addTo(map)
.bindPopup("Driver: "+driver.name)

})

}

async function loadOrders(){

const r = await fetch("/platform/orders")
const data = await r.json()

if(!data.orders) return

data.orders.forEach(order => {

if(!order.data) return

const lat = order.data.latitude
const lng = order.data.longitude

if(!lat) return

L.circleMarker([lat,lng],{
radius:8,
color:"red"
}).addTo(map)
.bindPopup("Order "+order.source_order_id)

})

}

loadDrivers()
loadOrders()

</script>

</body>
</html>
